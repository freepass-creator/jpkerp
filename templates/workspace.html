{% extends 'base.html' %}
{% from '_macros/ui.html' import btn_icon %}
{% block body %}
<div class="shell" id="shell">
  <aside class="sidebar">
    <div class="sidebar-top">
      <a class="sidebar-link" href="/home">
        <i class="ph ph-squares-four" style="font-size:var(--icon-md)"></i>
        <span class="sidebar-link-label">대시보드</span>
      </a>
    </div>
    <nav class="sidebar-menu" id="sidebarMenu"></nav>
    <div class="sidebar-bottom">
      <button class="sidebar-link" id="cpTrigger" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <span class="sidebar-link-label">검색</span>
        <kbd class="sidebar-kbd">Ctrl+K</kbd>
      </button>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div style="flex:1;min-width:0"></div>
      <div class="topbar-center" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:8px;font-size:var(--font-size-md);color:var(--c-text);white-space:nowrap;pointer-events:none">
        <span id="topbarBreadcrumb" style="display:flex;align-items:center;gap:6px;color:var(--c-text-sub);font-size:var(--font-size)"></span>
        <span style="display:flex;align-items:center;gap:6px;font-weight:var(--fw-medium)">
          {% block topbar_extra %}{% endblock %}
        </span>
      </div>
      <div style="display:flex;align-items:center;gap:8px" id="topbarRight">
        <button class="btn btn-icon" id="profileBtn" title="내 정보">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
      </div>
    </header>
    <section class="workspace {% block workspace_layout %}layout-1{% endblock %}">
      {% block workspace %}{% endblock %}
    </section>
  </main>
</div>
<div class="toast-host" id="toastHost"></div>
<div class="cp-host" id="cpHost" hidden>
  <div class="cp-panel">
    <input type="text" class="cp-input" id="cpInput" placeholder="차량번호 / 고객명 검색...">
    <div class="cp-results" id="cpResults"></div>
  </div>
</div>
{% endblock %}

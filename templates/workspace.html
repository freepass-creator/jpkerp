{% extends 'base.html' %}
{% from '_macros/ui.html' import btn_icon %}
{% block body %}
<div class="shell" id="shell">
  <aside class="sidebar">
    <nav class="sidebar-menu" id="sidebarMenu"></nav>
    <div class="sidebar-bottom">
      <button class="sidebar-link" id="cpTrigger" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <span class="sidebar-link-label">검색</span>
        <kbd class="sidebar-kbd">Ctrl+K</kbd>
      </button>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      {% block topbar_extra %}{% endblock %}
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px" id="topbarRight">
        <button class="btn" id="chatBtn" title="대화방" style="position:relative">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
        </button>
        <button class="btn" id="notiBtn" title="알림" style="position:relative">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        </button>
        <button class="btn" id="profileBtn" title="내 정보" style="display:flex;align-items:center;gap:4px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="profileName" style="font-size:var(--font-size-sm)"></span>
        </button>
      </div>
    </header>
    <section class="workspace {% block workspace_layout %}layout-1{% endblock %}">
      {% block workspace %}{% endblock %}
    </section>
  </main>
</div>
<div class="toast-host" id="toastHost"></div>
<div class="cp-host" id="cpHost" hidden>
  <div class="cp-panel">
    <input type="text" class="cp-input" id="cpInput" placeholder="차량번호 / 고객명 검색...">
    <div class="cp-results" id="cpResults"></div>
  </div>
</div>
{% endblock %}

{% extends 'base-mobile.html' %}
{% block main %}
<div class="m-section">
  <div class="m-section-title">내정보</div>
  <div style="padding:20px;background:#fff;border:1px solid #e3e2de;border-radius:12px;text-align:center">
    <i class="ph ph-user-circle" style="font-size:56px;color:#9b9a97"></i>
    <div id="myName" style="margin-top:8px;font-size:16px;font-weight:600;letter-spacing:-0.01em">로그인 정보 로드중…</div>
    <div id="myEmail" style="margin-top:2px;font-size:12px;color:#9b9a97"></div>
    <div id="myRole" style="margin-top:6px;font-size:11px;color:#2383e2;font-weight:600;text-transform:uppercase;letter-spacing:0.5px"></div>
  </div>

  <button class="m-btn m-btn-primary" id="btnInstall" hidden style="margin-top:12px">
    <i class="ph ph-download-simple"></i> 앱으로 설치하기
  </button>
  <div id="iosHint" hidden style="margin-top:12px;padding:14px;background:#fff;border:1px solid #e3e2de;border-radius:10px;font-size:12px;color:#37352f;line-height:1.6">
    <strong>iPhone 홈 화면에 추가</strong><br>
    Safari 하단 <i class="ph ph-export"></i> 공유 → <strong>"홈 화면에 추가"</strong>
  </div>

  <a class="m-btn" href="/?desktop=1" style="margin-top:8px">
    <i class="ph ph-monitor"></i> 데스크탑 버전으로
  </a>
  <button class="m-btn" id="btnLogout" style="margin-top:8px;color:#e03e3e">
    <i class="ph ph-sign-out"></i> 로그아웃
  </button>
</div>

<script type="module">
  import { auth } from "{{ url_for('static', filename='js/firebase/config.js') }}";
  import { signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

  // 로그인 정보 표시 (auth.js 가 __mUser 세팅)
  const ready = setInterval(() => {
    if (!window.__mUser) return;
    clearInterval(ready);
    document.getElementById('myName').textContent = window.__mUser.name || '—';
    document.getElementById('myEmail').textContent = window.__mUser.email || '';
    document.getElementById('myRole').textContent = window.__mUser.role || '';
  }, 100);

  document.getElementById('btnLogout').addEventListener('click', async () => {
    if (!confirm('로그아웃 하시겠어요?')) return;
    await signOut(auth);
    location.href = '/m/login';
  });

  // PWA 설치
  let deferredPrompt = null;
  const installBtn = document.getElementById('btnInstall');
  const iosHint = document.getElementById('iosHint');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.hidden = false;
  });
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.hidden = true;
  });
  const ua = navigator.userAgent.toLowerCase();
  const isIOS = /iphone|ipad|ipod/.test(ua);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isIOS && !isStandalone) iosHint.hidden = false;
  if (isStandalone) { installBtn.hidden = true; iosHint.hidden = true; }
</script>
{% endblock %}

{% extends 'workspace.html' %}
{% block topbar_extra %}<span class="topbar-status">보험관리</span>{% endblock %}
{% block workspace %}
<section class="panel">
  <div class="panel-head">
    <div style="display:flex;align-items:center;gap:6px">
      <i class="ph ph-shield-check" style="color:var(--c-text-muted)"></i>
      <span class="panel-title">보험 목록</span>
      <span class="panel-subtitle" id="insCount">0건</span>
    </div>
    <div class="panel-actions">
      <input id="insSearch" type="search" class="ctrl" placeholder="검색" style="width:180px;height:28px">
      <button id="insExportCsv" class="btn btn-sm"><i class="ph ph-file-csv"></i> CSV</button>
      <button id="insExportXlsx" class="btn btn-sm"><i class="ph ph-file-xls"></i> Excel</button>
    </div>
  </div>
  <div id="insuranceGrid" class="ag-theme-alpine" style="flex:1;min-height:0;width:100%"></div>
</section>
{% endblock %}

{% extends 'workspace.html' %}
{% block topbar_extra %}<span class="topbar-status">휴차 현황</span>{% endblock %}
{% block workspace_layout %}layout-55{% endblock %}
{% block workspace %}
<section class="panel">
  <div class="panel-head">
    <div>
      <i class="ph ph-pause-circle" style="color:var(--c-text-muted)"></i>
      <span class="panel-title">휴차 차량</span>
      <span class="panel-subtitle"><span id="idleCount">0</span>대</span>
    </div>
    <div class="panel-actions">
      <input type="text" id="idleSearch" class="ctrl" placeholder="검색" style="width:160px">
    </div>
  </div>
  <div id="idleGrid" class="ag-theme-alpine" style="flex:1;min-height:0;width:100%"></div>
</section>

<section class="panel">
  <div class="panel-head">
    <div>
      <i class="ph ph-clock-counter-clockwise" style="color:var(--c-text-muted)"></i>
      <span class="panel-title" id="idleHistoryTitle">이력관리</span>
      <span class="panel-subtitle" id="idleHistorySub">좌측에서 차량을 선택하세요</span>
    </div>
  </div>
  <div id="idleHistory" style="flex:1;min-height:0;overflow:auto"></div>
</section>
{% endblock %}

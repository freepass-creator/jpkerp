{% extends 'workspace.html' %}
{% block topbar_extra %}<span class="topbar-status">운영현황</span>{% endblock %}
{% block workspace_layout %}layout-55{% endblock %}
{% block workspace %}
<section class="panel">
  <div class="panel-head">
    <div>
      <i class="ph ph-chart-line" style="color:var(--c-text-muted)"></i>
      <span class="panel-title">차량별 운영 리포트</span>
      <span class="panel-subtitle"><span id="opCount">0</span>대</span>
    </div>
    <div class="panel-actions">
      <select id="opPartner" class="ctrl" style="width:120px">
        <option value="">전체 회원사</option>
      </select>
      <select id="opStatus" class="ctrl" style="width:110px">
        <option value="">전체 상태</option>
        <option value="가동중">가동중</option>
        <option value="휴차">휴차</option>
        <option value="정비중">정비중</option>
        <option value="매각예정">매각예정</option>
      </select>
    </div>
  </div>
  <div id="opSummary" style="flex-shrink:0;padding:10px 14px;border-bottom:1px solid var(--c-border);background:var(--c-bg-sub);display:flex;flex-wrap:wrap;gap:14px 16px;font-size:var(--font-size-sm)"></div>
  <div id="opGrid" class="ag-theme-alpine" style="flex:1;min-height:0;width:100%"></div>
</section>

<section class="panel">
  <div class="panel-head">
    <div>
      <i class="ph ph-clock-counter-clockwise" style="color:var(--c-text-muted)"></i>
      <span class="panel-title" id="opHistoryTitle">이력관리</span>
      <span class="panel-subtitle" id="opHistorySub">좌측에서 차량을 선택하세요</span>
    </div>
  </div>
  <div id="opHistory" style="flex:1;min-height:0;overflow:auto"></div>
</section>
{% endblock %}

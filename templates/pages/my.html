<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계약조회 - JPK</title>
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/controls.css">
  <style>
    body { font-family: var(--font-sans); background: #f5f5f4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .my-card { background: #fff; border-radius: var(--r-md); box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 100%; max-width: 420px; padding: 32px; }
    .my-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 24px; }
    .my-field { margin-bottom: 14px; }
    .my-field label { display: block; font-size: 12px; color: var(--c-text-sub); margin-bottom: 4px; }
    .my-field input { width: 100%; height: 40px; padding: 0 12px; border: 1px solid var(--c-border); border-radius: var(--r-md); font-size: 14px; outline: none; box-sizing: border-box; }
    .my-field input:focus { border-color: var(--c-primary); box-shadow: 0 0 0 3px var(--c-primary-bg); }
    .my-btn { width: 100%; height: 42px; background: var(--c-text); color: #fff; border: none; border-radius: var(--r-md); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .my-btn:hover { background: #555; }
    .my-result { margin-top: 20px; }
    .my-result-card { background: var(--c-bg-sub); border: 1px solid var(--c-border); border-radius: var(--r-md); padding: 16px; }
    .my-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--c-border); font-size: 13px; }
    .my-row:last-child { border-bottom: none; }
    .my-row-label { color: var(--c-text-muted); }
    .my-row-value { font-weight: 500; }
    .my-error { color: var(--c-danger); text-align: center; margin-top: 12px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="my-card">
    <div class="my-title">계약 조회</div>
    <form id="myForm">
      <div class="my-field">
        <label>차량번호</label>
        <input type="text" id="myCarNo" placeholder="예: 02무0357" required>
      </div>
      <div class="my-field">
        <label>계약자 등록번호 (생년월일 6자리 또는 사업자등록번호)</label>
        <input type="text" id="myRegNo" placeholder="예: 900101 또는 123-45-67890" required>
      </div>
      <button type="submit" class="my-btn">조회하기</button>
    </form>
    <div id="myResult" class="my-result"></div>
  </div>
  <script type="module">
    import { db } from '/static/js/firebase/config.js';
    import { ref, get } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js';

    document.getElementById('myForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const carNo = document.getElementById('myCarNo').value.trim();
      const regNo = document.getElementById('myRegNo').value.trim().replace(/-/g, '');
      const result = document.getElementById('myResult');
      result.innerHTML = '<div style="text-align:center;color:var(--c-text-muted)">조회 중...</div>';

      try {
        const snap = await get(ref(db, 'contracts'));
        const all = Object.values(snap.val() || {});
        const match = all.find(c => {
          if (c.car_number !== carNo) return false;
          const cReg = String(c.contractor_reg_no || '').replace(/-/g, '');
          return cReg === regNo || cReg.startsWith(regNo) || cReg.endsWith(regNo);
        });

        if (!match) {
          result.innerHTML = '<div class="my-error">일치하는 계약을 찾을 수 없습니다.</div>';
          return;
        }

        const fmt = (v) => v ? Number(v).toLocaleString('ko-KR') : '-';
        const endDate = (() => {
          if (match.end_date) return match.end_date;
          if (!match.start_date || !match.rent_months) return '-';
          let s = String(match.start_date).replace(/[./]/g, '-');
          const m = s.match(/^(\d{2})-/);
          if (m) s = (Number(m[1]) < 50 ? '20' : '19') + s;
          const d = new Date(s);
          d.setMonth(d.getMonth() + Number(match.rent_months));
          d.setDate(d.getDate() - 1);
          return d.toISOString().slice(0, 10);
        })();

        // 수납 조회
        const billSnap = await get(ref(db, 'billings'));
        const bills = Object.values(billSnap.val() || {}).filter(b => b.contract_code === match.contract_code);
        const totalDue = bills.reduce((s, b) => s + (Number(b.amount) || 0), 0);
        const totalPaid = bills.reduce((s, b) => s + (Number(b.paid_total) || 0), 0);

        // 자산 조회
        const assetSnap = await get(ref(db, 'assets'));
        const assetAll = Object.values(assetSnap.val() || {});
        const asset = assetAll.find(a => a.car_number === match.car_number) || {};

        const fmtDate = (s) => {
          if (!s) return '-';
          const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
          return m ? `${m[1].slice(2)}.${m[2]}.${m[3]}` : s;
        };

        const unpaid = totalDue - totalPaid;
        const sortedBills = bills.sort((a, b) => (a.seq || 0) - (b.seq || 0));

        const row = (label, value, style) => `<div class="my-row"><span class="my-row-label">${label}</span><span class="my-row-value"${style ? ` style="${style}"` : ''}>${value}</span></div>`;

        result.innerHTML = `
          <!-- 계약 정보 -->
          <div class="my-result-card">
            ${row('계약자', match.contractor_name || '-')}
            ${row('차량번호', match.car_number)}
            ${row('차종', [asset.manufacturer, asset.car_model, asset.ext_color ? `(${asset.ext_color})` : ''].filter(Boolean).join(' ') || '-')}
            ${row('계약기간', `${fmtDate(match.start_date)} ~ ${fmtDate(endDate)} (${match.rent_months || '-'}개월)`)}
            ${row('월 대여료', `${fmt(match.rent_amount)}원`)}
            ${row('보증금', `${fmt(match.deposit_amount)}원`)}
            ${row('결제일', `매월 ${match.auto_debit_day || '-'}일`)}
          </div>

          <!-- 납부 현황 -->
          <div class="my-result-card" style="margin-top:12px">
            <div style="font-weight:600;margin-bottom:8px">납부 현황</div>
            ${row('총 청구', `${fmt(totalDue)}원`)}
            ${row('총 납부', `${fmt(totalPaid)}원`, 'color:#0f7b0f')}
            ${row('미수금', `${fmt(unpaid)}원`, `color:${unpaid > 0 ? '#e03e3e' : '#0f7b0f'};font-weight:700`)}
          </div>

          <!-- 세부 스케줄 -->
          <div class="my-result-card" style="margin-top:12px">
            <div id="scheduleToggle" style="font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
              <span>세부 스케줄 확인하기</span>
              <span id="scheduleArrow" style="font-size:12px">▼</span>
            </div>
            <div id="scheduleBody" hidden style="margin-top:8px">
              ${sortedBills.map(b => {
                const due = Number(b.amount) || 0;
                const paid = Number(b.paid_total) || 0;
                const isDone = paid >= due;
                return `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee;font-size:12px">
                  <span>${b.seq}회차</span>
                  <span>${fmtDate(b.due_date)}</span>
                  <span>${fmt(due)}원</span>
                  <span style="color:${isDone ? '#0f7b0f' : '#e03e3e'};font-weight:500">${isDone ? '✓ 완납' : '미납'}</span>
                </div>`;
              }).join('')}
            </div>
          </div>

          <!-- 서류 다운로드 -->
          <div class="my-result-card" style="margin-top:12px">
            <div style="font-weight:600;margin-bottom:8px">서류</div>
            <div style="display:flex;flex-direction:column;gap:6px">
              <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #eee">
                <span>📄 임대차계약서</span><span style="color:var(--c-text-muted);font-size:12px">준비 중</span>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #eee">
                <span>📄 차량등록증</span><span style="color:var(--c-text-muted);font-size:12px">준비 중</span>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0">
                <span>📄 보험가입증명서</span><span style="color:var(--c-text-muted);font-size:12px">준비 중</span>
              </div>
            </div>
          </div>

          <!-- 보험 정보 -->
          <div class="my-result-card" style="margin-top:12px">
            <div style="font-weight:600;margin-bottom:8px">보험 정보</div>
            ${row('보험사', asset.insurance_company || '-')}
            ${row('보험연령', asset.insurance_age || '-')}
            ${row('보험만기', fmtDate(asset.insurance_end) || '-')}
          </div>

          <!-- 문의 -->
          <div style="margin-top:16px;text-align:center;padding:12px;background:#f5f5f4;border-radius:var(--r-md)">
            <div style="font-size:12px;color:var(--c-text-muted)">문의</div>
            <a href="tel:02-XXX-XXXX" style="font-size:16px;font-weight:700;color:var(--c-text);text-decoration:none">📞 02-XXX-XXXX</a>
          </div>
        `;

        // 스케줄 토글
        document.getElementById('scheduleToggle')?.addEventListener('click', () => {
          const body = document.getElementById('scheduleBody');
          const arrow = document.getElementById('scheduleArrow');
          if (body.hidden) { body.hidden = false; arrow.textContent = '▲'; }
          else { body.hidden = true; arrow.textContent = '▼'; }
        });
      } catch (err) {
        result.innerHTML = '<div class="my-error">조회 중 오류가 발생했습니다.</div>';
        console.error(err);
      }
    });
  </script>
</body>
</html>

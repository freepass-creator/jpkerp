{% extends 'workspace.html' %}
{% block topbar_extra %}<span class="topbar-status">운영관리</span>{% endblock %}
{% block workspace_layout %}layout-37{% endblock %}
{% block workspace %}
<section class="panel">
  <div class="panel-head">
    <div><span class="panel-title">유형</span></div>
  </div>
  <div class="panel-body" id="opViewList" style="overflow-y:auto"></div>
</section>
<section class="panel">
  <div class="panel-head">
    <div>
      <span class="panel-title" id="opViewTitle">전체</span>
      <span class="panel-subtitle" id="opViewCount"></span>
    </div>
  </div>
  <div id="opViewGrid" class="ag-theme-alpine" style="flex:1;min-height:0;width:100%"></div>
  <div id="opDetailView" hidden style="flex:1;min-height:0;width:100%;overflow:auto"></div>
</section>
{% endblock %}

{% extends 'workspace.html' %}
{% block topbar_extra %}<span class="topbar-status">미납관리</span>{% endblock %}
{% block workspace_layout %}layout-55{% endblock %}
{% block workspace %}
<section class="panel">
  <div class="panel-head">
    <div>
      <i class="ph ph-warning-circle" style="color:var(--c-danger)"></i>
      <span class="panel-title">미납 목록</span>
      <span class="panel-subtitle" id="overdueCount">집계 중...</span>
    </div>
    <div class="panel-actions">
      <select id="overdueFilter" class="ctrl" style="min-width:120px">
        <option value="all">전체</option>
        <option value="7">7일+ 연체</option>
        <option value="14">14일+ 연체</option>
        <option value="30">30일+ 연체</option>
        <option value="multi">2회차+ 미납</option>
      </select>
    </div>
  </div>
  <div id="overdueGrid" class="ag-theme-alpine" style="flex:1;min-height:0;width:100%"></div>
</section>

<section class="panel">
  <div class="panel-head">
    <div>
      <i class="ph ph-clock-counter-clockwise" style="color:var(--c-text-muted)"></i>
      <span class="panel-title" id="overdueHistoryTitle">이력관리</span>
      <span class="panel-subtitle" id="overdueHistorySub">좌측에서 계약자를 선택하세요</span>
    </div>
  </div>
  <div id="overdueHistory" style="flex:1;min-height:0;overflow:auto"></div>
</section>
{% endblock %}

{% extends 'workspace.html' %}
{% block topbar_extra %}<span class="topbar-status">상품대기</span>{% endblock %}
{% block workspace_layout %}layout-55{% endblock %}
{% block workspace %}
<section class="panel">
  <div class="panel-head">
    <div>
      <i class="ph ph-storefront" style="color:var(--c-primary)"></i>
      <span class="panel-title">상품 대기</span>
      <span class="panel-subtitle"><span id="productCount">0</span>대</span>
    </div>
    <div class="panel-actions">
      <input type="text" id="productSearch" class="ctrl" placeholder="검색" style="width:160px">
    </div>
  </div>
  <div id="productGrid" class="ag-theme-alpine" style="flex:1;min-height:0;width:100%"></div>
</section>

<section class="panel">
  <div class="panel-head">
    <div>
      <i class="ph ph-currency-krw" style="color:var(--c-text-muted)"></i>
      <span class="panel-title" id="prodDetailTitle">상품 상세</span>
      <span class="panel-subtitle" id="prodDetailSub">좌측에서 상품을 선택하세요</span>
    </div>
  </div>
  <div id="prodDetail" style="flex:1;min-height:0;overflow:auto"></div>
</section>
{% endblock %}

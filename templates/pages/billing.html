{% extends 'workspace.html' %}
{% from '_macros/ui.html' import btn %}
{% block topbar_extra %}<span id="billingInfo">수납관리</span>{% endblock %}
{% block workspace %}
<section class="panel">
  <div class="panel-head">
    <div style="display:flex;align-items:center;gap:6px">
      <i class="ph ph-currency-krw" style="color:var(--c-text-muted)"></i>
      <span class="panel-title">수납</span>
    </div>
    <div class="panel-actions" style="margin-left:auto;display:flex;align-items:center;gap:6px">
      <button class="btn btn-icon" id="billingPrev" title="이전 월">◀</button>
      <button class="btn" id="billingMonth" style="min-width:90px;text-align:center"></button>
      <button class="btn btn-icon" id="billingNext" title="다음 월">▶</button>
      <button class="btn" id="billingToday" style="font-size:var(--font-size-xs)">오늘</button>
    </div>
  </div>
  <div id="billingGrid" class="ag-theme-alpine" style="flex:1;min-height:0;width:100%"></div>
  <div id="billingDetail" hidden style="flex:1;min-height:0;width:100%;overflow:auto"></div>
</section>
{% endblock %}

{% extends 'workspace.html' %}
{% block topbar_extra %}<span class="topbar-status">업로드센터</span>{% endblock %}
{% block workspace %}
<div id="uploadHost" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px">
  <label id="uploadDrop" style="border:2px dashed var(--c-border-strong);border-radius:var(--r-md);padding:60px 80px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--c-text-muted);max-width:600px;width:100%;transition:background var(--t-fast)">
    <input type="file" id="uploadFile" multiple accept=".csv,.pdf,.png,.jpg,.jpeg,.xlsx,.xls" hidden>
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <div style="font-size:14px;font-weight:600;color:var(--c-text)">파일을 끌어다 놓으세요</div>
    <div style="font-size:11px">PDF · 이미지 · CSV · 엑셀 · 구글시트 — 자동 감지</div>
  </label>
  <div id="uploadResult" style="margin-top:24px;width:100%;max-width:600px"></div>
</div>
{% endblock %}

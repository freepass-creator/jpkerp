{% extends 'workspace.html' %}
{% block topbar_extra %}<span class="topbar-status">개발도구</span>{% endblock %}
{% block workspace_layout %}layout-254{% endblock %}
{% block workspace %}
<section class="panel">
  <div class="panel-head">
    <div>
      <i class="ph ph-list-bullets" style="color:var(--c-text-muted)"></i>
      <span class="panel-title">기능 선택</span>
    </div>
  </div>
  <div class="panel-body" id="devList" style="overflow-y:auto"></div>
</section>

<section class="panel">
  <div class="panel-head">
    <div>
      <span class="panel-title" id="devContentTitle">기능을 선택하세요</span>
      <span class="panel-subtitle" id="devContentSub"></span>
    </div>
    <div class="panel-actions">
      <button type="button" class="btn" id="devReset" style="display:none"><i class="ph ph-arrow-counter-clockwise"></i> 초기화</button>
      <button type="button" class="btn btn-primary" id="devApply" style="display:none"><i class="ph ph-check"></i> 반영하기</button>
    </div>
  </div>
  <div class="panel-body is-pad" id="devHost" style="overflow-y:auto">
    <div style="padding:24px;text-align:center;color:var(--c-text-muted)">좌측에서 기능을 선택하세요.</div>
  </div>
</section>

<section class="panel">
  <div class="panel-head">
    <div>
      <i class="ph ph-terminal" style="color:var(--c-text-muted)"></i>
      <span class="panel-title" id="devResultTitle">결과</span>
      <span class="panel-subtitle" id="devResultSub"></span>
    </div>
  </div>
  <div class="panel-body is-pad" id="devResultHost" style="overflow-y:auto">
    <div style="padding:24px;text-align:center;color:var(--c-text-muted)">실행 결과가 여기 표시됩니다.</div>
  </div>
</section>
{% endblock %}

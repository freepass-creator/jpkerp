{% extends 'workspace.html' %}
{% from '_macros/ui.html' import btn %}
{% block topbar_extra %}자산관리 · <span id="assetCount">0</span>건{% endblock %}
{% block workspace %}
<section class="panel" style="flex:1;min-height:0">
  <div class="panel-head">
    <div style="display:flex;align-items:center;gap:6px">
      <i class="ph ph-car" style="color:var(--c-text-muted)"></i>
      <span class="panel-title">자산</span>
    </div>
    <div class="panel-actions" style="margin-left:auto;display:flex;align-items:center;gap:6px">
      <div class="search-box" style="width:200px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="assetSearch" placeholder="검색">
      </div>
      <button class="btn btn-primary" id="assetEditToggle"><i class="ph ph-pencil-simple"></i><span>수정</span></button>
      {{ btn('plus', '행 추가', id='assetAddRow') }}
      {{ btn('upload', '업로드', id='assetUpload') }}
    </div>
  </div>
  <div id="assetGrid" class="ag-theme-alpine" style="flex:1;min-height:0;width:100%"></div>
</section>
{% endblock %}

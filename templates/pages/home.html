{% extends 'workspace.html' %}
{% block topbar_extra %}
  <span class="topbar-status">대시보드</span>
{% endblock %}
{% block workspace %}
<div style="display:flex;flex:1;min-height:0;gap:1px;background:var(--c-border)">
  <section class="panel" style="flex:1;min-width:0">
    <div class="panel-head"><div><span class="panel-title">회사현황</span></div></div>
    <div class="panel-body is-pad" id="dashCompany" style="display:flex;flex-direction:column;gap:12px;overflow:auto"></div>
  </section>
  <section class="panel" style="flex:1;min-width:0">
    <div class="panel-head"><div><span class="panel-title">업무상황</span></div></div>
    <div class="panel-body is-pad" id="dashTeam" style="display:flex;flex-direction:column;gap:12px;overflow:auto"></div>
  </section>
  <section class="panel" style="flex:1;min-width:0">
    <div class="panel-head"><div><span class="panel-title">최근업무</span></div></div>
    <div class="panel-body is-pad" id="dashMy" style="display:flex;flex-direction:column;gap:12px;overflow:auto"></div>
  </section>
</div>
{% endblock %}

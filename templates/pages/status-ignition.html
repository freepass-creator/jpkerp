{% extends 'workspace.html' %}
{% block topbar_extra %}<span class="topbar-status">시동제어</span>{% endblock %}
{% block workspace_layout %}layout-55{% endblock %}
{% block workspace %}
<section class="panel">
  <div class="panel-head">
    <div>
      <i class="ph ph-warning-circle" style="color:#ea580c"></i>
      <span class="panel-title">시동제어 / 회수 진행</span>
      <span class="panel-subtitle"><span id="igCount">0</span>대</span>
    </div>
  </div>
  <div id="igGrid" class="ag-theme-alpine" style="flex:1;min-height:0;width:100%"></div>
</section>

<section class="panel">
  <div class="panel-head">
    <div>
      <i class="ph ph-clock-counter-clockwise" style="color:var(--c-text-muted)"></i>
      <span class="panel-title" id="igHistoryTitle">이력관리</span>
      <span class="panel-subtitle" id="igHistorySub">좌측에서 차량을 선택하세요</span>
    </div>
  </div>
  <div id="igHistory" style="flex:1;min-height:0;overflow:auto"></div>
</section>
{% endblock %}

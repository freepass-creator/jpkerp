{% extends 'workspace.html' %}
{% from '_macros/ui.html' import btn %}
{% block topbar_extra %}
  <div style="display:flex;gap:4px">
    <button class="btn ledger-period is-active" data-period="day">일별</button>
    <button class="btn ledger-period" data-period="week">주간</button>
    <button class="btn ledger-period" data-period="month">월별</button>
    <button class="btn ledger-period" data-period="quarter">분기</button>
    <button class="btn ledger-period" data-period="half">반기</button>
    <button class="btn ledger-period" data-period="year">연도</button>
  </div>
  <input type="month" id="ledgerMonth" class="btn" style="padding:2px 8px">
  <span class="topbar-status" id="ledgerInfo">입출금내역</span>
{% endblock %}
{% block workspace %}
<div style="width:100%;height:100%;display:flex;flex-direction:column">
  <div id="ledgerSummary" style="flex-shrink:0;border-bottom:1px solid var(--c-border)"></div>
  <div id="ledgerGrid" class="ag-theme-alpine" style="flex:1;min-height:0;width:100%"></div>
<div id="ledgerDetailView" hidden style="flex:1;min-height:0;width:100%;overflow:auto"></div>
</div>
{% endblock %}

{% extends 'workspace.html' %}
{% from '_macros/ui.html' import btn %}
{% block topbar_extra %}<span class="topbar-status">고지서업무</span>{% endblock %}
{% block workspace_layout %}layout-37{% endblock %}
{% block workspace %}
<!-- 좌: 업로드 + 필터 -->
<section class="panel">
  <div class="panel-head">
    <div style="display:flex;align-items:center;gap:6px">
      <i class="ph ph-upload-simple" style="color:var(--c-text-muted)"></i>
      <span class="panel-title">고지서 업로드</span>
    </div>
  </div>
  <div class="panel-body is-pad" style="overflow-y:auto;display:flex;flex-direction:column;gap:14px">
    <label id="noticeDrop" class="photo-dropzone">
      <input type="file" id="noticeFile" multiple accept=".pdf,.png,.jpg,.jpeg,.heic" hidden>
      <i class="ph ph-upload-simple"></i>
      <div class="photo-dropzone-title">과태료/통행료 고지서</div>
      <div class="photo-dropzone-sub">PDF · 이미지 · 여러 장 가능 · 클릭/드래그/Ctrl+V</div>
    </label>

    <div id="noticeStatus" style="display:flex;flex-direction:column;gap:6px"></div>

    <!-- 기존 이력 필터 -->
    <div class="form-section">
      <div class="form-section-title">조회 필터</div>
      <div class="form-grid">
        <div class="field"><label>날짜</label><input type="date" id="noticeFilterDate"></div>
        <div class="field"><label>상태</label>
          <select id="noticeFilterStatus">
            <option value="">전체</option>
            <option value="미납" selected>미납</option>
            <option value="납부완료">납부완료</option>
          </select>
        </div>
      </div>
    </div>

    <button class="btn" id="noticeRefresh" style="width:100%">
      <i class="ph ph-magnifying-glass"></i> 조회
    </button>

    <!-- 일괄 다운로드 -->
    <button class="btn btn-primary" id="noticeDownloadAll" style="width:100%">
      <i class="ph ph-download-simple"></i> 일괄 다운로드 (고지서+확인서)
    </button>
  </div>
</section>

<!-- 우: 목록 + 상세 -->
<section class="panel">
  <div class="panel-head">
    <div style="display:flex;align-items:center;gap:6px">
      <i class="ph ph-prohibit" style="color:var(--c-text-muted)"></i>
      <span class="panel-title">과태료 목록</span>
      <span class="panel-subtitle" id="noticeInfo">0건</span>
    </div>
    <div class="panel-actions">
      {{ btn('file-text', '확인서 출력', id='noticePrintConfirm') }}
    </div>
  </div>
  <div id="noticeGrid" class="ag-theme-alpine" style="flex:1;min-height:0;width:100%"></div>
</section>
{% endblock %}

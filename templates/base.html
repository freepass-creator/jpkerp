<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title or 'JPK ERP' }}</title>

  <!-- 파비콘 -->
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/icon-180.png') }}">

  <!-- Open Graph / 카카오톡·페북 공유 -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="teamjpk">
  <meta property="og:title" content="teamjpk">
  <meta property="og:description" content="함께 달리는 길, 우리가 만듭니다.  ·  JPK ERP">
  <meta property="og:image" content="{{ url_for('static', filename='og-image.png', _external=True) }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:locale" content="ko_KR">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="teamjpk">
  <meta name="twitter:description" content="함께 달리는 길, 우리가 만듭니다.  ·  JPK ERP">
  <meta name="twitter:image" content="{{ url_for('static', filename='og-image.png', _external=True) }}">

  <meta name="description" content="JPK ERP — 장기렌터카 운영 시스템. 함께 달리는 길, 우리가 만듭니다.">
  <meta name="theme-color" content="#fbfbfa">

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <!-- Phosphor Icons — regular + fill (활성 아이콘) -->
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}?v={{ v }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}?v={{ v }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}?v={{ v }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/panel.css') }}?v={{ v }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/controls.css') }}?v={{ v }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}?v={{ v }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/grid.css') }}?v={{ v }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/util.css') }}?v={{ v }}">
  <!-- AG Grid -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32/styles/ag-theme-alpine.css">
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@32/dist/ag-grid-community.min.noStyle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>
<body>
  {% block body %}{% endblock %}
  <script>window.APP_VER = '{{ v }}';</script>
  <script type="module" src="{{ url_for('static', filename='js/app.js') }}?v={{ v }}"></script>
</body>
</html>
